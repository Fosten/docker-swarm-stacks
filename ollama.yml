version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    networks:
      - traefik-public
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
    volumes:
      - ${HOME}/ollama:/root/.ollama
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == ${STACK_PARAM}

networks:
  traefik-public:
    external: true