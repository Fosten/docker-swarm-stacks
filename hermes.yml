version: '3.9'

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    command: gateway run
    volumes:
      - ${HOME}/.hermes/gateway:/opt/data
    networks:
      - hermes-net
      - traefik-public
    environment:
      - HERMES_DASHBOARD=1
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == ${STACK_PARAM}
      labels:
        - traefik.enable=true
        - traefik.http.routers.hermes.rule=Host(`${HERMES_HOSTNAME}`)
        - traefik.http.services.hermes.loadbalancer.server.port=9119
        - traefik.http.routers.hermes.entrypoints=${TRAEFIK_ENTRYPOINT}
        - traefik.http.routers.hermes.tls=${TRAEFIK_TLS_ENABLED}
        - traefik.http.routers.hermes.tls.certresolver=mydnschallenge

networks:
  hermes-net:
    driver: overlay
  traefik-public:
    external: true
