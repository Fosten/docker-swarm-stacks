version: '3.9'

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ${HOME}/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == ${STACK_PARAM}
      labels:
        - traefik.enable=true
        - traefik.http.routers.otel-http.rule=Host(`${OTEL_HTTP_HOSTNAME}`)
        - traefik.http.routers.otel-http.entrypoints=${TRAEFIK_ENTRYPOINT}
        - traefik.http.routers.otel-http.tls=${TRAEFIK_TLS_ENABLED}
        - traefik.http.routers.otel-http.service=otel-http
        - traefik.http.services.otel-http.loadbalancer.server.port=4318
        - traefik.http.routers.otel-grpc.rule=Host(`${OTEL_GRPC_HOSTNAME}`)
        - traefik.http.routers.otel-grpc.entrypoints=${TRAEFIK_ENTRYPOINT}
        - traefik.http.routers.otel-grpc.tls=${TRAEFIK_TLS_ENABLED}
        - traefik.http.routers.otel-grpc.service=otel-grpc
        - traefik.http.services.otel-grpc.loadbalancer.server.scheme=h2c
        - traefik.http.services.otel-grpc.loadbalancer.server.port=4317
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
