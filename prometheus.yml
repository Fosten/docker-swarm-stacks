version: '3.9'

services:
  prometheus:
    image: prom/prometheus:latest
    networks:
      - traefik-public
    volumes:
      - ${HOME}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${HOME}/prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2d
      - --web.listen-address=:9090
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == ${STACK_PARAM}
      labels:
        - traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_HOSTNAME}`)
        - traefik.http.services.prometheus.loadbalancer.server.port=9090
        - traefik.http.routers.prometheus.entrypoints=http

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    networks:
      - traefik-public
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux


  alertmanager:
    image: prom/alertmanager:latest
    networks:
      - traefik-public
    volumes:
      - ${HOME}/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${HOME}/prometheus/alertmanager-data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == ${STACK_PARAM}

networks:
  traefik-public:
    external: true
